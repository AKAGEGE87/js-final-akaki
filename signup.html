<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — 10X CRM</title>
  <meta name="description" content="Create your free 10X CRM account and start managing your sales pipeline today.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

  <!-- Animated background -->
  <div class="auth-bg">
    <div class="auth-bg-gradient"></div>
    <div class="auth-bg-grid"></div>
  </div>

  <!-- Sign Up Card -->
  <div class="auth-container">
    <div class="auth-card fade-in-up">

      <div class="auth-logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">10X CRM</span>
      </div>

      <h1 class="auth-title">Create your account</h1>
      <p class="auth-subtitle">Start managing your clients smarter</p>

      <form id="signup-form" novalidate>

        <!-- Full Name -->
        <div class="form-group">
          <div style="display:flex; justify-content:space-between; align-items:center">
            <label class="form-label" for="fullName">Full Name</label>
            <span id="name-counter" class="field-counter">0 / 50</span>
          </div>
          <input
            type="text"
            id="fullName"
            class="form-input"
            placeholder="Nino Beridze"
            autocomplete="name"
            maxlength="50"
          >
        </div>

        <!-- Email -->
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input
            type="text"
            id="email"
            class="form-input"
            placeholder="you@example.com"
            autocomplete="email"
          >
        </div>

        <!-- Company (optional) -->
        <div class="form-group">
          <label class="form-label" for="company">Company</label>
          <input
            type="text"
            id="company"
            class="form-input"
            placeholder="Company (optional)"
            autocomplete="organization"
          >
        </div>

        <!-- Password -->
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-wrapper">
            <input
              type="password"
              id="password"
              class="form-input"
              placeholder="••••••••"
              autocomplete="new-password"
            >
            <button type="button" class="toggle-password" onclick="togglePassword('password')" tabindex="-1" aria-label="Toggle password visibility">👁</button>
          </div>
          <!-- Password strength indicator (bonus) -->
          <div id="password-strength" class="password-strength">
            <div class="strength-bar" id="strength-bar"></div>
          </div>
          <span class="strength-label" id="strength-label"></span>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm Password</label>
          <div class="input-wrapper">
            <input
              type="password"
              id="confirmPassword"
              class="form-input"
              placeholder="••••••••"
              autocomplete="new-password"
            >
            <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword')" tabindex="-1" aria-label="Toggle confirm password visibility">👁</button>
          </div>
        </div>

        <button type="submit" id="signup-btn" class="btn btn-primary btn-full" style="margin-top:0.5rem">
          Create Account
        </button>

      </form>

      <p class="auth-link">Already have an account? <a href="index.html">Log in</a></p>

    </div>
  </div>

  <div id="toast-container"></div>

  <script src="js/storage.js"></script>
  <script src="js/guard.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/auth.js"></script>
  <script>initSignUp();</script>
</body>
</html>
